name: Cloudflare Scan

on:
  workflow_dispatch:
    inputs:
      iata_code:
        description: 'IATA码（可选），例如：LAX'
        required: false
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests
          
      - name: Run scan
        env:
          IATA_CODE: ${{ inputs.iata_code || vars.IATA_CODE || '' }}
        run: |
          echo "IATA_CODE environment variable: '${{ env.IATA_CODE }}'"
          python scan_cli.py
          
      - name: Commit and push results
        run: |
          ls -la
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 确保添加所有 CSV 文件
          git add "*.csv" 2>/dev/null || true
          
          git status
          
          # 检查是否有文件被添加
          git diff --cached --name-only
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update scan results: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:${GITHUB_REF}
          fi
